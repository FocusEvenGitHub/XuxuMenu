<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Cardápio</title>
    <style>
        body {
            font-family: 'Montserrat', Arial, sans-serif;
            background: #f7f2ed;
            padding: 30px;
            color: #111;
        }
        h1, h2 { font-family: 'Bebas Neue', Impact, sans-serif; }
        section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .imagem-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .imagem-item img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border: 3px dashed #bbb;
            border-radius: 12px;
            background: #eee;
        }
        button {
            background: #b31217;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
        }
        button:hover { background: #8b1e24; }
        input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 250px;
        }
        .ing-item {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
        }
        .remover {
            background: #555;
            font-size: 14px;
            padding: 4px 10px;
        }
        .mensagem {
            color: green;
            font-weight: 600;
            margin: 10px 0;
        }
    </style>
</head>
<body>
<h1>🔧 Administração do Cardápio</h1>

<!-- Seção de Imagens -->
<section>
    <h2>📷 Imagens dos Pratos</h2>
    <div id="containerImagens"></div>
</section>

<!-- Seção de Ingredientes do Prato do Dia -->
<section>
    <h2>🥘 Ingredientes do Prato do Dia</h2>
    <div id="containerIngredientes"></div>
    <button id="adicionarIngrediente">+ Adicionar Ingrediente</button>
    <button id="salvarIngredientes" style="margin-left: 10px;">💾 Salvar Ingredientes</button>
    <div class="mensagem" id="mensagemIngredientes"></div>
</section>

<script src="js/cardapio.js"></script>
<script>
    (function() {
        const imagens = [
            { chave: 'pratoDia', label: 'Prato do Dia' },
            { chave: 'salada',  label: 'Salada' },
            { chave: 'luis',    label: 'Luis' },
            { chave: 'barca',   label: 'Barca' }
        ];

        const containerImagens = document.getElementById('containerImagens');

        // Constrói os blocos de cada imagem
        imagens.forEach(imgDef => {
            const dataUrl = localStorage.getItem(`img_${imgDef.chave}`) || '';
            const div = document.createElement('div');
            div.className = 'imagem-item';
            div.innerHTML = `
                    <strong>${imgDef.label}</strong>
                    <img id="preview_${imgDef.chave}" src="${dataUrl}" alt="${imgDef.label}">
                    <input type="file" accept="image/*" id="input_${imgDef.chave}">
                    <button data-chave="${imgDef.chave}" class="btn-atualizar">Atualizar</button>
                `;
            containerImagens.appendChild(div);
        });

        // Configura os botões de upload
        containerImagens.addEventListener('click', async function(e) {
            if (e.target.classList.contains('btn-atualizar')) {
                const chave = e.target.dataset.chave;
                const input = document.getElementById(`input_${chave}`);
                const file = input.files[0];
                if (!file) {
                    alert('Selecione uma imagem.');
                    return;
                }
                try {
                    await salvarImagemLocal(chave, file, 400);
                    // Atualiza o preview
                    const dataUrl = localStorage.getItem(`img_${chave}`);
                    document.getElementById(`preview_${chave}`).src = dataUrl;
                    input.value = '';
                    alert('Imagem atualizada com sucesso!');
                } catch (err) {
                    alert('Erro ao salvar: ' + err);
                }
            }
        });

        // ---------- INGREDIENTES ----------
        const containerIngredientes = document.getElementById('containerIngredientes');
        let ingredientes = obterIngredientes();

        function renderIngredientes() {
            containerIngredientes.innerHTML = '';
            ingredientes.forEach((ing, index) => {
                const div = document.createElement('div');
                div.className = 'ing-item';
                div.innerHTML = `
                        <input type="text" value="${ing.replace(/"/g, '&quot;')}" data-index="${index}">
                        <button class="remover" data-index="${index}">✕ Remover</button>
                    `;
                containerIngredientes.appendChild(div);
            });
        }

        containerIngredientes.addEventListener('click', function(e) {
            if (e.target.classList.contains('remover')) {
                const idx = parseInt(e.target.dataset.index);
                ingredientes.splice(idx, 1);
                renderIngredientes();
            }
        });

        containerIngredientes.addEventListener('input', function(e) {
            if (e.target.tagName === 'INPUT' && e.target.dataset.index !== undefined) {
                const idx = parseInt(e.target.dataset.index);
                ingredientes[idx] = e.target.value;
            }
        });

        document.getElementById('adicionarIngrediente').addEventListener('click', function() {
            ingredientes.push('');
            renderIngredientes();
        });

        document.getElementById('salvarIngredientes').addEventListener('click', function() {
            // Remove strings vazias
            ingredientes = ingredientes.filter(i => i.trim() !== '');
            salvarIngredientes(ingredientes);
            document.getElementById('mensagemIngredientes').textContent = 'Ingredientes salvos com sucesso!';
            setTimeout(() => {
                document.getElementById('mensagemIngredientes').textContent = '';
            }, 3000);
            renderIngredientes();
        });

        renderIngredientes();
    })();
</script>
</body>
</html>
